<div class="simulator-layout">
  <app-control-panel
    [windSpeed]="windSpeed()"
    [windDirection]="windDirection()"
    [canStart]="canStart()"
    [isRunning]="isRunning()"
    [isPaused]="isPaused()"
    (windSpeedChange)="windSpeed.set($event)"
    (windDirectionChange)="windDirection.set($event)"
    (startSimulation)="onStart()"
    (pauseSimulation)="onPause()"
    (stopSimulation)="onStop()"
  />
  <app-map-viewer
    [zonePolygons]="zonePolygons()"
    [cellUpdates]="cellUpdates()"
    (ignitionPointChange)="onIgnitionPointChange($event)"
  />
</div>
